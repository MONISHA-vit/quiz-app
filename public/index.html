<!DOCTYPE html>
<html>
<head>
  <title>Quiz App v3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 60%;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .question {
      margin-bottom: 20px;
      padding: 15px;
      border-bottom: 1px solid #ddd;
    }

    label {
      display: block;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 20px;
    }

    .result-item {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
    }

    .correct {
      background-color: #d4edda;
      border-left: 6px solid green;
    }

    .wrong {
      background-color: #f8d7da;
      border-left: 6px solid red;
    }
  </style>

</head>
<body>

<div class="container">
  <h1>Quiz Application</h1>

  <form id="quizForm"></form>

  <button onclick="submitQuiz()">Submit Quiz</button>

  <div id="result"></div>
</div>

<script>
async function loadQuiz() {
  const res = await fetch('/quiz');
  const quiz = await res.json();

  const form = document.getElementById('quizForm');

  quiz.forEach((q, i) => {
    let html = `
      <div class="question">
        <p><b>${i + 1}. ${q.question}</b></p>
    `;

    q.options.forEach(opt => {
      html += `
        <label>
          <input type="radio" name="q${i}" value="${opt}">
          ${opt}
        </label>
      `;
    });

    html += `</div>`;
    form.innerHTML += html;
  });
}

async function submitQuiz() {
  event.preventDefault();

  const answers = [];

  for (let i = 0; i < 5; i++) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    answers.push(selected ? selected.value : "");
  }

  const res = await fetch('/attempt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers })
  });

  const data = await res.json();

  let output = `<h3>Score: ${data.score} / ${data.total}</h3>`;

  data.details.forEach(d => {
    output += `
      <div class="result-item ${d.isCorrect ? 'correct' : 'wrong'}">
        <p><b>${d.question}</b></p>
        <p>Your answer: ${d.selected || "Not answered"}</p>
        <p>Correct answer: ${d.correct}</p>
      </div>
    `;
  });

  document.getElementById('result').innerHTML = output;
}

loadQuiz();
</script>

</body>
</html>
