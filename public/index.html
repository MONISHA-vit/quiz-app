<!DOCTYPE html>
<html>
<head>
  <title>Quiz App v2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 60%;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .question {
      margin-bottom: 20px;
      padding: 15px;
      border-bottom: 1px solid #ddd;
    }

    .question p {
      font-weight: bold;
    }

    label {
      display: block;
      margin: 5px 0;
      cursor: pointer;
    }

    button {
      display: block;
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: green;
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>Quiz Application</h1>

    <form id="quizForm"></form>

    <button onclick="submitQuiz()">Submit Quiz</button>

    <div id="result"></div>
  </div>

<script>
async function loadQuiz() {
  const res = await fetch('/quiz');
  const quiz = await res.json();

  const form = document.getElementById('quizForm');

  quiz.forEach((q, i) => {
    let html = `
      <div class="question">
        <p>${i + 1}. ${q.question}</p>
    `;

    q.options.forEach(opt => {
      html += `
        <label>
          <input type="radio" name="q${i}" value="${opt}">
          ${opt}
        </label>
      `;
    });

    html += `</div>`;
    form.innerHTML += html;
  });
}

async function submitQuiz() {
  event.preventDefault();

  const answers = [];

  for (let i = 0; i < 5; i++) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    answers.push(selected ? selected.value : "");
  }

  const res = await fetch('/attempt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers })
  });

  const data = await res.json();

  document.getElementById('result').innerText =
    `Score: ${data.score} / ${data.total}`;
}

loadQuiz();
</script>

</body>
</html>
